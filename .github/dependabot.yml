version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # npm (TypeScript SDK)
  - package-ecosystem: npm
    directory: "/sdk-ts"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels: ["dependencies", "typescript"]

  # Go modules
  - package-ecosystem: gomod
    directory: "/sdk-go"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 3
    labels: ["dependencies", "go"]

  # Rust (Cargo)
  - package-ecosystem: cargo
    directory: "/sdk-rs"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
