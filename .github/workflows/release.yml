name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to attach SBOM to GitHub release
  id-token: write   # required for trusted publishing

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install hatch

      - name: Build distributions
        run: hatch build

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "Tag: $TAG  Package: $PKG"
          [ "$TAG" = "$PKG" ] || (echo "Version mismatch" && exit 1)

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: aria-bsv-${{ github.ref_name }}.spdx.json
          format: spdx-json

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: aria-bsv-${{ github.ref_name }}.spdx.json
