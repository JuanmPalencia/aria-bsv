name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff>=0.4
      - name: Check formatting and lint
        run: ruff check . --ignore E501,E731 && ruff format --check . || true

  # --------------------------------------------------------------------------
  # Unit + integration tests — matrix
  # --------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.10"
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ tests/chaos/ \
                 --tb=short -q \
                 --timeout=60

      - name: Run tests with coverage (3.11 only)
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        run: |
          pip install pytest-cov
          pytest tests/unit/ tests/chaos/ --tb=short -q \
                 --cov=aria --cov=registry --cov=portal \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --timeout=60

      - name: Upload coverage
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Docker build smoke test + multi-arch (linux/amd64 + linux/arm64)
  # --------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64 — fast, for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: aria-bsv:ci-test
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm aria-bsv:ci-test python -c "
          from aria.quick import ARIAQuick
          aria = ARIAQuick('ci-smoke', db_path='/tmp/ci.db', watchdog=False)
          aria.start()
          aria.record('model', {}, {})
          s = aria.close()
          print('Smoke test passed:', s.epoch_id)
          aria.stop()
          "

      - name: Build multi-arch image (amd64 + arm64, no push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: aria-bsv:main
          cache-from: type=gha

  # --------------------------------------------------------------------------
  # Performance benchmarks — non-blocking, informational
  # --------------------------------------------------------------------------
  perf:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    continue-on-error: true  # Timing-sensitive; CI runners vary — never block merge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmark suite
        run: |
          pytest tests/perf/ -v --tb=short --timeout=120
