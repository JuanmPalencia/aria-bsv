replicaCount: 2

image:
  repository: ghcr.io/juanmpalencia/aria-bsv
  pullPolicy: IfNotPresent
  tag: ""   # defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: nginx
  host: aria.example.com
  annotations: {}
  tls:
    enabled: false
    clusterIssuer: letsencrypt-prod

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  SYSTEM_ID: "aria-production"
  ARC_URL: "https://arc.taal.com"
  LOG_LEVEL: "info"
  BATCH_SIZE: "100"
  BATCH_MS: "5000"

# Secrets — create a k8s Secret named 'aria-auditor-secrets' with these keys:
# BSV_WIF, DATABASE_URL, ARC_API_KEY
existingSecret: "aria-auditor-secrets"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
