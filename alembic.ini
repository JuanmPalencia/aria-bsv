# alembic.ini — Alembic configuration for ARIA database migrations.
#
# The URL below is a placeholder.  Override it at runtime with:
#   ARIA_DB_URL=postgresql+psycopg2://user:pass@host/db alembic upgrade head
# or pass --config directly:
#   alembic -x db_url=postgresql+psycopg2://... upgrade head

[alembic]
script_location = migrations
prepend_sys_path = .

# Placeholder — overridden by env.py via ARIA_DB_URL environment variable.
sqlalchemy.url = postgresql+psycopg2://aria:aria@localhost:5432/aria

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
