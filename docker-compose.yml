version: "3.9"

# ============================================================================
# ARIA-BSV — Docker Compose stack
#
# Services:
#   aria-portal    — FastAPI portal (epoch explorer, compliance dashboard)
#   aria-watchdog  — Background health monitor
#   aria-registry  — System registry API
#   postgres       — PostgreSQL storage backend (optional; default is SQLite)
#   prometheus     — Prometheus metrics scraper
#   grafana        — Grafana dashboards
#
# Quick start (SQLite, no BSV key):
#   docker compose up aria-portal
#
# Full stack with BSV anchoring:
#   BSV_WIF=<your-wif> ARIA_SYSTEM_ID=my-app docker compose up
# ============================================================================

x-aria-common: &aria-common
  image: aria-bsv:latest
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    ARIA_SYSTEM_ID: ${ARIA_SYSTEM_ID:-aria-demo}
    ARIA_DB_URL: ${ARIA_DB_URL:-sqlite:////data/aria.db}
    ARIA_NETWORK: ${ARIA_NETWORK:-mainnet}
    ARIA_LOG_LEVEL: ${ARIA_LOG_LEVEL:-INFO}
    BSV_WIF: ${BSV_WIF:-}
  volumes:
    - aria_data:/data

services:
  # --------------------------------------------------------------------------
  # Portal API — epoch explorer & compliance dashboard
  # --------------------------------------------------------------------------
  aria-portal:
    <<: *aria-common
    container_name: aria-portal
    ports:
      - "${ARIA_PORTAL_PORT:-8080}:8080"
    command: >
      python -m uvicorn portal.backend.api:app
      --host 0.0.0.0
      --port 8080
      --log-level ${ARIA_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "aria.service=portal"

  # --------------------------------------------------------------------------
  # Watchdog daemon — background health monitoring
  # --------------------------------------------------------------------------
  aria-watchdog:
    <<: *aria-common
    container_name: aria-watchdog
    command: python -c "
      from aria.storage.sqlite import SQLiteStorage;
      from aria.watchdog import WatchdogDaemon;
      import os, time;
      storage = SQLiteStorage(os.environ.get('ARIA_DB_URL', 'sqlite:////data/aria.db'));
      wd = WatchdogDaemon(storage=storage, system_id=os.environ.get('ARIA_SYSTEM_ID', 'aria'));
      wd.start();
      print('Watchdog started');
      [time.sleep(3600) for _ in iter(int, 1)]
      "
    labels:
      - "aria.service=watchdog"

  # --------------------------------------------------------------------------
  # Registry API — system/model registration
  # --------------------------------------------------------------------------
  aria-registry:
    <<: *aria-common
    container_name: aria-registry
    ports:
      - "${ARIA_REGISTRY_PORT:-8081}:8081"
    command: >
      python -m uvicorn registry.api:app
      --host 0.0.0.0
      --port 8081
      --log-level ${ARIA_LOG_LEVEL:-info}
    labels:
      - "aria.service=registry"

  # --------------------------------------------------------------------------
  # PostgreSQL (optional — remove if using SQLite)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aria
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria} -d aria"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # --------------------------------------------------------------------------
  # Prometheus metrics scraper
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: aria-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    profiles:
      - monitoring

  # --------------------------------------------------------------------------
  # Grafana dashboards
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: aria-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-aria_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  aria_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: aria-network
